<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO</title>

    <link rel="stylesheet"
    href="assets/css/bootstrap.min.css">
</head>

<body
style="background: linear-gradient(135deg,rgb(33,132,145),rgb(18,80,90));">

    <div class="container mt-5 w-50 m-auto text-center p-5 rounded-4 shadow-lg"
    style="background-color: rgba(0,0,0,0.75);">

        <form id="formRegistros">

            <h1 class="fw-bold mb-4"
            style="color: rgb(120,220,255);">
                REGISTRO
            </h1>

            <div class="mb-3">

                <label
                for="nombre"
                class="form-label text-white fw-bold">

                    Nombre

                </label>

                <input
                type="text"
                class="form-control rounded-pill p-2"
                id="nombre"
                name="nombre"
                required
                placeholder="Ingresa nombre">

            </div>

            <div class="mb-3">

                <label
                for="correo"
                class="form-label text-white fw-bold">

                    Correo

                </label>

                <input
                type="email"
                class="form-control rounded-pill p-2"
                id="correo"
                name="correo"
                required
                placeholder="Ingresa correo">

            </div>

            <div class="mb-3">

                <label
                for="password"
                class="form-label text-white fw-bold">

                    Password

                </label>

                <input
                type="password"
                class="form-control rounded-pill p-2"
                id="password"
                name="password"
                required
                placeholder="Ingresa contraseña">

            </div>

            <button
            type="button"
            class="btn btn-link"
            onclick="registrarUsuario()"
            style="background-color: rgb(33,132,145); color:white;">

                Registrar

            </button>

            <br>

            <a
            href="index.html"
            class="btn btn-link mt-2"
            style="color: rgb(120,220,255); text-decoration:none;">

                Iniciar Sesión

            </a>

        </form>

    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/sweetalert2.all.min.js"></script>

    <script src="assets/js/funciones.js"></script>

    <script src="assets/js/appSistema.js"></script>

</body>
</html>
